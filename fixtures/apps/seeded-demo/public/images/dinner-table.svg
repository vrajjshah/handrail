<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img">
  <title>A set dinner table seen from above</title>
  <!-- Wooden table surface -->
  <rect width="800" height="500" fill="#8b5e34" />
  <g stroke="#7a5029" stroke-width="3" opacity="0.7">
    <line x1="0" y1="70" x2="800" y2="70" />
    <line x1="0" y1="180" x2="800" y2="180" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="420" x2="800" y2="420" />
  </g>

  <!-- Placemat -->
  <rect x="180" y="110" width="440" height="290" rx="14" fill="#c8a06b" opacity="0.85" />

  <!-- Dinner plate -->
  <circle cx="400" cy="255" r="120" fill="#fdfdfb" stroke="#d9d5cc" stroke-width="4" />
  <circle cx="400" cy="255" r="88" fill="#ffffff" stroke="#e6e2d9" stroke-width="3" />
  <!-- Food on the plate -->
  <ellipse cx="378" cy="240" rx="42" ry="30" fill="#b5651d" />
  <ellipse cx="378" cy="234" rx="34" ry="22" fill="#cf7b2c" />
  <circle cx="432" cy="272" r="16" fill="#3f7d3a" />
  <circle cx="452" cy="252" r="12" fill="#4f9147" />
  <circle cx="416" cy="292" r="10" fill="#5aa350" />
  <circle cx="360" cy="292" r="13" fill="#c62f2f" />
  <circle cx="338" cy="272" r="10" fill="#d94444" />

  <!-- Fork, to the left of the plate -->
  <g fill="#c0c4c9">
    <rect x="228" y="180" width="13" height="160" rx="6" />
    <rect x="222" y="150" width="6" height="42" rx="3" />
    <rect x="232" y="150" width="6" height="42" rx="3" />
    <rect x="242" y="150" width="6" height="42" rx="3" />
    <rect x="252" y="150" width="6" height="42" rx="3" />
    <rect x="220" y="186" width="40" height="14" rx="7" />
  </g>

  <!-- Knife, to the right of the plate -->
  <g fill="#c0c4c9">
    <rect x="560" y="200" width="14" height="140" rx="7" />
    <path d="M560 150 h14 a18 18 0 0 1 0 36 h-14 z" />
    <rect x="558" y="150" width="18" height="60" rx="8" />
  </g>

  <!-- Wine glass, upper right -->
  <g>
    <path d="M624 96 h56 l-8 58 a20 20 0 0 1 -40 0 z" fill="#8e2b40" opacity="0.85" />
    <path d="M620 84 h64 l-4 26 h-56 z" fill="#e8ecef" opacity="0.75" />
    <rect x="648" y="150" width="8" height="46" fill="#e0e4e8" />
    <ellipse cx="652" cy="200" rx="34" ry="8" fill="#e0e4e8" />
  </g>

  <!-- Folded napkin, lower left -->
  <g>
    <rect x="200" y="360" width="96" height="66" rx="6" fill="#dce3ea" transform="rotate(-6 248 393)" />
    <rect x="208" y="372" width="80" height="44" rx="4" fill="#eef3f7" transform="rotate(-6 248 394)" />
  </g>

  <!-- Bread roll on a side plate, upper left -->
  <g>
    <circle cx="180" cy="120" r="52" fill="#fdfdfb" stroke="#d9d5cc" stroke-width="3" />
    <ellipse cx="180" cy="118" rx="34" ry="24" fill="#d9a441" />
    <path d="M156 112 q24 -14 48 0" stroke="#b8862c" stroke-width="4" fill="none" />
  </g>
</svg>
