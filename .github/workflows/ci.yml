name: CI

on:
  push:
    branches: [main]
  pull_request:

# A superseded run on the same branch is wasted minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Nothing in CI may reach a model provider. The deterministic path is the
  # gate, and it has to stay honest about that.
  MODEL_MODE: replay

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # Handrail is a CLI that OSS users will run on all three platforms, so the
  # unit suite runs on all three. Browser and eval jobs stay ubuntu-only.
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: dist must not contain test files
        run: |
          if find packages/*/dist -name '*.test.*' -print -quit | grep -q .; then
            echo "::error::test output leaked into a published dist directory"
            exit 1
          fi

  # Browser-driven capture. Ubuntu-only by design: it needs a real Chromium, and
  # the point of the three-OS `unit` matrix is that it stays fast and dependency-free.
  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Resolve the pinned Playwright version
        id: playwright
        run: echo "version=$(pnpm --filter @handrail/engine exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache the browser download
        id: browser-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright.outputs.version }}

      - name: Install Chromium
        run: pnpm --filter @handrail/engine exec playwright install --with-deps chromium

      # The capture suite runs against the real fixture app, not a synthetic
      # document — document coordinates and the accessibility tree only behave
      # correctly on a real origin.
      - run: pnpm --filter @handrail/fixture-seeded-demo build
      - run: pnpm test:browser

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high
