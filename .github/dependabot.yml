version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # One PR for the dev toolchain rather than eight. Production deps stay
      # separate so they get read properly.
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      production-patches:
        dependency-type: production
        update-types: [patch]
    ignore:
      # Pinned deliberately — see docs/adr/0003-toolchain-version-drift.md.
      # typescript-eslint caps its peer range at <6.1.0.
      - dependency-name: typescript
        versions: ['>=7']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
